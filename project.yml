name: Freq
options:
  bundleIdPrefix: com.freq
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
targets:
  Freq:
    type: application
    platform: iOS
    sources:
      - path: Freq
        excludes:
          - "**/*.example.swift"
    info:
      path: Freq/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - freq
            CFBundleURLName: com.freq.app
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freq.app
        INFOPLIST_FILE: Freq/Info.plist
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Freq
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
